<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Skaner plomb</title>


<script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/index.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>


<style>

body{
margin:0;
padding:10px;
background:#eef3f8;
font-family:Arial,sans-serif;
}


h1{
background:#1565c0;
color:white;
text-align:center;
padding:15px;
border-radius:12px;
}


.box{
background:white;
padding:12px;
margin-top:10px;
border-radius:12px;
box-shadow:0 2px 8px #bbb;
}


video{
width:100%;
height:240px;
background:black;
border-radius:12px;
object-fit:cover;
}


button{
width:100%;
padding:12px;
margin-top:8px;
border:0;
border-radius:10px;
background:#1565c0;
color:white;
font-size:17px;
font-weight:bold;
}


button:active{
transform:scale(0.97);
}


input{
width:100%;
padding:12px;
font-size:18px;
border-radius:8px;
border:1px solid #aaa;
}


#status{
padding:10px;
margin-top:8px;
border-radius:8px;
text-align:center;
font-weight:bold;
background:#fff3cd;
}


#numer{
font-size:32px;
font-weight:bold;
text-align:center;
margin:15px;
}


#barcode{
width:100%;
height:120px;
}


.hist button{
background:#e3f2fd;
color:#000;
}


#licznik{
font-size:28px;
font-weight:bold;
text-align:center;
}


</style>

</head>


<body>


<h1>
📷 SKANER PLOMB
</h1>



<div class="box">

<h3>Kamera</h3>

<video id="video" autoplay muted playsinline></video>

<div id="status">
Kamera wyłączona
</div>


<button onclick="uruchomSkaner()">
▶ Włącz skaner
</button>


</div>



<div class="box">

<h3>Aktualna plomba</h3>


<div id="numer">
Brak
</div>


<svg id="barcode"></svg>


</div>



<div class="box">

<h3>Historia plomb</h3>

<div id="historia" class="hist">

</div>


</div>



<div class="box">

<h3>Wpis ręczny</h3>

<input id="reczna" placeholder="Numer plomby">


<button onclick="dodajRecznie()">
➕ Dodaj plombę
</button>


</div>



<div class="box">

<h3>Licznik</h3>

<div id="licznik">
0
</div>


</div>



<script>


const video =
document.getElementById("video");


let reader;

let historia=[];

let aktualna="";// ============================
// URUCHOMIENIE SKANERA
// ============================


async function uruchomSkaner(){


try{


ustawStatus(
"Uruchamianie kamery...",
true
);



reader =
new ZXingBrowser.BrowserMultiFormatReader();



const kamery =

await ZXingBrowser.BrowserMultiFormatReader
.listVideoInputDevices();



if(kamery.length===0){

throw new Error("Brak kamery");

}



let tylna =

kamery.find(

k =>

k.label.toLowerCase().includes("back")
||
k.label.toLowerCase().includes("rear")

);



if(!tylna){

tylna =
kamery[kamery.length-1];

}




reader.decodeFromVideoDevice(

tylna.deviceId,

video,


(result)=>{


if(result){


obsluzKod(
result.getText()
);


}


}


);



ustawStatus(
"✅ Skaner działa",
true
);



}

catch(e){


console.log(e);


ustawStatus(
"❌ Błąd: "+e.message,
false
);


}


}




function ustawStatus(txt,ok){


const s =
document.getElementById("status");


s.innerHTML=txt;



if(ok){

s.style.background="#c8e6c9";

}

else{

s.style.background="#ffcdd2";

}



}





// ============================
// OBSŁUGA PLOMBY
// ============================


function obsluzKod(kod){


kod=kod.trim();



if(

!kod.startsWith("01")

&&

!kod.startsWith("05")

){


ustawStatus(
"❌ Nieprawidłowa plomba",
false
);


return;

}





if(historia.includes(kod)){


ustawStatus(
"⚠️ Plomba już zeskanowana",
false
);


return;


}



historia.unshift(kod);


pokazPlombe(kod);



ustawStatus(
"✅ Zeskanowano "+kod,
true
);



}





function pokazPlombe(kod){


aktualna=kod;



document.getElementById("numer")
.innerHTML=kod;



JsBarcode(

"#barcode",

kod,

{

format:"CODE128",

displayValue:false,

height:120,

margin:10

}

);



odswiezHistorie();



}





function odswiezHistorie(){


let wynik="";



historia.forEach(

(kod,index)=>{


wynik+=`

<button onclick="wybierzHistorie('${kod}')">

${index+1}. ${kod}

</button>

`;


}

);



document.getElementById("historia")
.innerHTML=wynik;



document.getElementById("licznik")
.innerHTML=historia.length;



}// ============================
// WYBÓR Z HISTORII
// ============================


function wybierzHistorie(kod){


pokazPlombe(kod);


ustawStatus(
"📌 Wybrano z historii",
true
);


}





// ============================
// RĘCZNE DODANIE
// ============================


function dodajRecznie(){


let kod =

document.getElementById("reczna")
.value
.trim();



if(kod===""){

return;

}



obsluzKod(kod);



document.getElementById("reczna")
.value="";


}





// ============================
// START
// ============================



</script>


</body>

</html>
